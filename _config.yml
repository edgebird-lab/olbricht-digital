# Olbricht Digital – GitHub Pages Config
# Docs: https://docs.github.com/en/pages

title: "Olbricht Digital"
description: "Moderne Softwareentwicklung, individuelle Weblösungen und datengetriebene Anwendungen."
url: "https://olbricht-digital.de"   # Deine Custom Domain – sonst z. B. https://deinusername.github.io
baseurl: ""                           # Leer lassen bei Custom Domain; bei Repo-Subdomain z. B. "/olbricht-digital"

# Jekyll-Verarbeitung
markdown: kramdown
theme: null                           # Kein Jekyll-Theme – wir nutzen unser eigenes CSS

# Exclude non-public files from the build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - .git/

# Plugins (GitHub Pages safe-list)
plugins: []
